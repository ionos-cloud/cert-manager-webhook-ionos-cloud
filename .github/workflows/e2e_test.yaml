name: e2e tests
on:
  pull_request:

jobs:
    e2e-test:
      runs-on: ubuntu-latest
      steps:
        - name: Create k8s Kind Cluster
          uses: helm/kind-action@v1
        - uses: azure/setup-helm@v4.3.1
          name: install helm
        - uses: actions/checkout@v6
          name: checkout
        - name: get current cert manager version
          id: get-cert-manager-version
          run: |
            echo "cert_manager_version=$(cat go.mod | grep github.com/cert-manager/cert-manager | cut -d ' ' -f 2)" >> "$GITHUB_OUTPUT"
        - name: run e2e tests
          env:
            TEST_ZONE_NAME: ${{ secrets.TEST_ZONE_NAME }}
            IONOS_TOKEN: ${{ secrets.IONOS_TOKEN }}
          run : |
           ./run-e2e-tests.sh --cert-manager-version ${{ steps.get-cert-manager-version.outputs.cert_manager_version }}

          
            